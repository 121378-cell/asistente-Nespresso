services:
  - type: web
    name: asistente-nespresso-api
    runtime: node
    plan: free
    autoDeploy: true
    buildCommand: npm ci && npm --prefix backend ci && npm --prefix backend run prisma:generate && npm --prefix backend run build
    startCommand: npm --prefix backend run prisma:push && npm --prefix backend run start
    envVars:
      - key: NODE_ENV
        value: development
      - key: TRUST_PROXY
        value: "true"
      - key: DATABASE_URL
        fromDatabase:
          name: asistente-nespresso-db
          property: connectionString
      - key: FRONTEND_URL
        sync: false
      - key: LLM_PROVIDER
        value: groq
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.1-8b-instant
      - key: JWT_SECRET
        sync: false

  - type: web
    name: asistente-nespresso-web
    runtime: static
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: true
    envVars:
      - key: VITE_API_URL
        sync: false

databases:
  - name: asistente-nespresso-db
    plan: free
