services:
  postgres:
    image: postgres:16-alpine
    container_name: nespresso-postgres-local
    restart: unless-stopped
    environment:
      POSTGRES_DB: nespresso_assistant
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d nespresso_assistant']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
